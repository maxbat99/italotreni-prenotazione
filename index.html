						<body>
						
						  <h2>🚆 Prenota il tuo treno</h2>
						  <div class="italo-form">
						    <input type="text" id="da" placeholder="Da (es. Milano)" />
						    <input type="text" id="a" placeholder="A (es. Roma)" />
						    <select id="ambiente">
						      <option value="">Ambiente</option>
						      <option value="Smart">Smart</option>
						      <option value="Comfort">Comfort</option>
						      <option value="Prima">Prima</option>
						    </select>
						    <select id="orario">
						      <option value="">Orario</option>
						      <option value="mattina">Mattina (00:00–12:00)</option>
						      <option value="pomeriggio">Pomeriggio (12:00–18:00)</option>
						      <option value="sera">Sera (18:00–23:59)</option>
						    </select>
						    <button onclick="filtraTreni()">Cerca</button>
						  </div>
						
						  <div id="italotreni"></div>
						  <div id="riepilogo"></div>
						
						  <script>
						    const stripe = Stripe("pk_live_51RcZZKFt7EaY9OTPn4hu3z4ZYfvJLZ1JsqNJhsyKj7T5BBSQCDOGVMDq5YUCkYL5HqsqoE9et25CbUjGZkAdpblO00lNy34est");
						    let tuttiTreni = [];
						
						    const endpoint = "https://script.google.com/macros/s/AKfycbyqKn1lcDJUPsRg_HtKOAlKJMlG4mfYtRPIITzqUdKh/dev";
						
						    fetch(endpoint)
						      .then(res => {
						        if (!res.ok) throw new Error("Errore HTTP: " + res.status);
						        return res.json();
						      })
						      .then(data => {
						        tuttiTreni = data;
						        mostraTreni(data);
						      })
						      .catch(err => {
						        console.error("❌ Errore nel caricamento treni:", err);
						        document.getElementById("italotreni").innerHTML = "<p>❌ Errore nel caricamento treni.</p>";
						      });
						
						    function mostraTreni(treni) {
						      let html = `
						        <div class="italo-row italo-header">
						          <div class="italo-col">Partenza</div>
						          <div class="italo-col">Arrivo</div>
						          <div class="italo-col">Orario</div>
						          <div class="italo-col">Prezzo</div>
						          <div class="italo-col">Tipo</div>
						          <div class="italo-col">Ambiente</div>
						          <div class="italo-col">Azione</div>
						        </div>
						      `;
						      treni.forEach(t => {
						        html += `
						          <div class="italo-row">
						            <div class="italo-col">${t.partenza}</div>
						            <div class="italo-col">${t.arrivo}</div>
						            <div class="italo-col">${t.orario}</div>
						            <div class="italo-col">${t.prezzo}</div>
						            <div class="italo-col">${t.treno}</div>
						            <div class="italo-col">${t.ambiente}</div>
						            <div class="italo-col">
						              <button class="btn-prenota" onclick='acquista(${JSON.stringify(t)})'>Prenota</button>
						            </div>
						          </div>
						        `;
						      });
						      document.getElementById("italotreni").innerHTML = html;
						    }
						
						    function filtraTreni() {
						      const da = document.getElementById("da").value.toLowerCase();
						      const a = document.getElementById("a").value.toLowerCase();
						      const ambiente = document.getElementById("ambiente").value.toLowerCase();
						      const fascia = document.getElementById("orario").value;
						
						      const filtrati = tuttiTreni.filter(t => {
						        const ora = parseInt(t.orario.split(":")[0]);
						        let matchOrario = true;
						        if (fascia === "mattina") matchOrario = ora < 12;
						        else if (fascia === "pomeriggio") matchOrario = ora >= 12 && ora < 18;
						        else if (fascia === "sera") matchOrario = ora >= 18;
						
						        return (
						          t.partenza.toLowerCase().includes(da) &&
						          t.arrivo.toLowerCase().includes(a) &&
						          t.ambiente.toLowerCase().includes(ambiente) &&
						          matchOrario
						        );
						      });
						
						      mostraTreni(filtrati);
						    }
						
						    function acquista(treno) {
						      const html = `
						        <h3>🎫 Riepilogo Prenotazione</h3>
						        <p><strong>Da:</strong> ${treno.partenza} → <strong>A:</strong> ${treno.arrivo}</p>
						        <p><strong>Orario:</strong> ${treno.orario} | <strong>Ambiente:</strong> ${treno.ambiente}</p>
						        <p><strong>Prezzo:</strong> ${treno.prezzo}</p>
						        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Treno-${treno.treno}-${treno.orario}" alt="QR Biglietto">
						        <br><br>
						        <button onclick='paga(${JSON.stringify(treno)})'>Procedi al pagamento</button>
						      `;
						      document.getElementById("riepilogo").innerHTML = html;
						    }
						
						    function paga(treno) {
						      const payload = {
						        codice: treno.treno,
						        partenza: treno.partenza,
						        arrivo: treno.arrivo,
						        orario: treno.orario,
						        ambiente: treno.ambiente,
						        prezzo: treno.prezzo.replace("€", "").replace(",", ".")
						      };
						
						      fetch("/.netlify/functions/create-checkout-session", {
						        method: "POST",
						        headers: { "Content-Type": "application/json" },
						        body: JSON.stringify(payload)
						      })
						      .then(res => res.json())
						      .then(session => {
						        if (!session.id) throw new Error("Sessione Stripe non valida");
						        return stripe.redirectToCheckout({ sessionId: session.id });
						      })
						      .catch(err => alert("❌ Errore nel pagamento: " + err.message));
						    }
						  </script>

		<script>
		
		const stripe = Stripe('pk_live_51RcZZKFt7EaY9OTPn4hu3z4ZYfvJLZ1JsqNJhsyKj7T5BBSQCDOGVMDq5YUCkYL5HqsqoE9et25CbUjGZkAdpblO00lNy34est'); // Inserisci la tua chiave pubblica Stripe
		
		
		
		document.addEventListener('DOMContentLoaded', () => {
		
		  const form = document.getElementById('train-search-form');
		
		  const results = document.getElementById('search-results');
		
		
		
		  form.addEventListener('submit', async (e) => {
		
		    e.preventDefault();
		
		    const query = new URLSearchParams(new FormData(form)).toString();
		
		    results.innerHTML = '🔎 Ricerca in corso...';
		
		
		
		    try {
		
		      const res = await fetch('/.netlify/functions/searchTrains?' + query);
		
		      const trains = await res.json();
		
		      results.innerHTML = trains.length ? trains.map(t => `
		
		        <div class="train-result">
		
		          <p><strong>${t.TrainNumber}</strong><br>${t.DepartureTime} → ${t.ArrivalTime}<br>Prezzo: €${t.Price}</p>
		
		          <button onclick="bookTrain('${t.TrainNumber}', ${parseFloat(t.Price) * 100})">Prenota</button>
		
		        </div>
		
		      `).join('') : '<p>❌ Nessun treno trovato.</p>';
		
		    } catch {
		
		      results.innerHTML = '<p>⚠️ Errore nella ricerca.</p>';
		
		    }
		
		  });
		
		});
		
		
		
		async function bookTrain(trainNumber, amount) {
		
		  try {
		
		    const res = await fetch('/.netlify/functions/create-checkout-session', {
		
		      method: 'POST',
		
		      headers: { 'Content-Type': 'application/json' },
		
		      body: JSON.stringify({ trainNumber, amount })
		
		    });
		
		    const data = await res.json();
		
		    if (data.url) {
		
		      window.location.href = data.url;
		
		    } else {
		
		      alert("❌ Pagamento non avviato.");
		
		    }
		
		  } catch {
		
		    alert('⚠️ Errore durante il pagamento.');
		
		  }
		
		}
		
		</script>
