						<body>
						  <h2>🚆 Prenota il tuo treno Italotreni</h2>
						
						  <div class="italo-form">
						    <input type="text" id="da" placeholder="Da (es. Milano)" required />
						    <input type="text" id="a" placeholder="A (es. Roma)" required />
						    <input type="date" id="data" required />
						    <select id="orario" required>
						      <option value="">Orario</option>
						      <option value="mattina">Mattina</option>
						      <option value="pomeriggio">Pomeriggio</option>
						      <option value="sera">Sera</option>
						    </select>
						    <select id="ambiente" required>
						      <option value="">Ambiente</option>
						      <option value="Smart">Smart</option>
						      <option value="Comfort">Comfort</option>
						      <option value="Executive">Executive</option>
						    </select>
						    <select id="posto" required>
						      <option value="">Posto</option>
						      <option value="14A - Finestrino">14A - Finestrino</option>
						      <option value="16D - Corridoio">16D - Corridoio</option>
						      <option value="18B - Singolo">18B - Singolo</option>
						    </select>
						    <input type="email" id="email" placeholder="Inserisci la tua email" required />
						    <button onclick="filtraTreni()">Cerca</button>
						  </div>
						
						  <div id="italotreni" style="margin-top: 30px;"></div>
						  <div id="riepilogo" style="margin-top: 30px;"></div>
						
						  <script>
						    const tuttiTreni = [
						      {
						        codice: "IT123",
						        partenza: "Milano",
						        arrivo: "Roma",
						        orario: "10:45",
						        prezzo: "49",
						        ambiente: "Smart",
						        treno: "Frecciarossa"
						      }
						      // Puoi aggiungere altri treni qui
						    ];
						
						    function filtraTreni() {
						      const da = document.getElementById("da").value.toLowerCase();
						      const a = document.getElementById("a").value.toLowerCase();
						      const ambiente = document.getElementById("ambiente").value.toLowerCase();
						      const fascia = document.getElementById("orario").value;
						
						      const filtrati = tuttiTreni.filter(t => {
						        const ora = parseInt(t.orario.split(":")[0]);
						        let matchOrario = true;
						        if (fascia === "mattina") matchOrario = ora < 12;
						        else if (fascia === "pomeriggio") matchOrario = ora >= 12 && ora < 18;
						        else if (fascia === "sera") matchOrario = ora >= 18;
						        return (
						          t.partenza.toLowerCase().includes(da) &&
						          t.arrivo.toLowerCase().includes(a) &&
						          t.ambiente.toLowerCase().includes(ambiente) &&
						          matchOrario
						        );
						      });
						
						      document.getElementById("italotreni").innerHTML = filtrati.length
						        ? filtrati.map(t => `
						          <div style="background:#fff; padding:15px; margin:10px; border:1px solid #ccc;">
						            <p><strong>${t.codice}</strong>: ${t.partenza} → ${t.arrivo} (${t.orario}) - €${t.prezzo}</p>
						            <button onclick='acquista(${JSON.stringify(t)})'>Prenota</button>
						          </div>
						        `).join('')
						        : "<p>Nessun treno trovato con i criteri selezionati.</p>";
						    }
						
						    function acquista(treno) {
						      const email = document.getElementById("email").value.trim();
						      const data = document.getElementById("data").value;
						      const posto = document.getElementById("posto").value;
						      const fascia = document.getElementById("orario").value;
						
						      const html = `
						        <h3>🎫 Riepilogo Prenotazione</h3>
						        <p><strong>Treno:</strong> ${treno.codice}</p>
						        <p><strong>Da:</strong> ${treno.partenza}</p>
						        <p><strong>A:</strong> ${treno.arrivo}</p>
						        <p><strong>Data:</strong> ${data}</p>
						        <p><strong>Orario:</strong> ${treno.orario} (${fascia})</p>
						        <p><strong>Ambiente:</strong> ${treno.ambiente}</p>
						        <p><strong>Posto:</strong> ${posto}</p>
						        <p><strong>Email:</strong> ${email}</p>
						        <p><strong>Prezzo:</strong> €${treno.prezzo}</p>
						        <button onclick='paga(${JSON.stringify(treno)}, "${email}", "${data}", "${posto}")'>💳 Procedi al pagamento</button>
						      `;
						      document.getElementById("riepilogo").innerHTML = html;
						    }
						
						    function paga(treno, email, data, posto) {
						      const payload = {
						        codice: treno.codice,
						        partenza: treno.partenza,
						        arrivo: treno.arrivo,
						        orario: treno.orario,
						        ambiente: treno.ambiente,
						        prezzo: Number(treno.prezzo),
						        email: email,
						        data: data,
						        posto: posto
						      };
						
						      fetch("/.netlify/functions/create-checkout-session", {
						        method: "POST",
						        headers: { "Content-Type": "application/json" },
						        body: JSON.stringify(payload)
						      })
						      .then(res => res.json())
						      .then(session => {
						        window.location.href = session.url;
						      })
						      .catch(err => alert("❌ Errore nel pagamento: " + err.message));
						    }
						  </script>
						</body>

		const stripe = Stripe('pk_live_51RcZZKFt7EaY9OTPn4hu3z4ZYfvJLZ1JsqNJhsyKj7T5BBSQCDOGVMDq5YUCkYL5HqsqoE9et25CbUjGZkAdpblO00lNy34est'); // Inserisci la tua chiave pubblica Stripe
		
		
		
		document.addEventListener('DOMContentLoaded', () => {
		
		  const form = document.getElementById('train-search-form');
		
		  const results = document.getElementById('search-results');
		
		
		
		  form.addEventListener('submit', async (e) => {
		
		    e.preventDefault();
		
		    const query = new URLSearchParams(new FormData(form)).toString();
		
		    results.innerHTML = '🔎 Ricerca in corso...';
		
		
		
		    try {
		
		      const res = await fetch('/.netlify/functions/searchTrains?' + query);
		
		      const trains = await res.json();
		
		      results.innerHTML = trains.length ? trains.map(t => `
		
		        <div class="train-result">
		
		          <p><strong>${t.TrainNumber}</strong><br>${t.DepartureTime} → ${t.ArrivalTime}<br>Prezzo: €${t.Price}</p>
		
		          <button onclick="bookTrain('${t.TrainNumber}', ${parseFloat(t.Price) * 100})">Prenota</button>
		
		        </div>
		
		      `).join('') : '<p>❌ Nessun treno trovato.</p>';
		
		    } catch {
		
		      results.innerHTML = '<p>⚠️ Errore nella ricerca.</p>';
		
		    }
		
		  });
		
		});
		
		
		
		async function bookTrain(trainNumber, amount) {
		
		  try {
		
		    const res = await fetch('/.netlify/functions/create-checkout-session', {
		
		      method: 'POST',
		
		      headers: { 'Content-Type': 'application/json' },
		
		      body: JSON.stringify({ trainNumber, amount })
		
		    });
		
		    const data = await res.json();
		
		    if (data.url) {
		
		      window.location.href = data.url;
		
		    } else {
		
		      alert("❌ Pagamento non avviato.");
		
		    }
		
		  } catch {
		
		    alert('⚠️ Errore durante il pagamento.');
		
		  }
		
		}
