						<script>
						// 👉 Inserisci qui la tua chiave pubblica Stripe
						const stripe = Stripe("pk_live_TUA_CHIAVE_PUBBLICA");
						
						// Funzione acquisto biglietto
						function acquista(treno) {
						  const data = document.getElementById("data-" + treno.codice).value;
						  const posto = document.getElementById("posto-" + treno.codice).value;
						  const email = document.getElementById("email-" + treno.codice).value;
						
						  const payload = {
						    codice: treno.codice,
						    partenza: treno.partenza,
						    arrivo: treno.arrivo,
						    prezzo: treno.prezzo.replace("€", "").replace(",", "."),
						    data,
						    posto,
						    email
						  };
						
						  document.getElementById("riepilogoBiglietto").innerHTML = `
						    <h3>🎫 Riepilogo Prenotazione</h3>
						    <p><strong>Da:</strong> ${treno.partenza}</p>
						    <p><strong>A:</strong> ${treno.arrivo}</p>
						    <p><strong>Data:</strong> ${data}</p>
						    <p><strong>Posto:</strong> ${posto}</p>
						    <p><strong>Email:</strong> ${email}</p>
						    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Treno-${treno.codice}-${data}-${posto}" alt="QR Biglietto">
						    <button id="confermaPagamento">Procedi al pagamento</button>
						  `;
						
						  document.getElementById("confermaPagamento").onclick = () => inviaPrenotazione(payload);
						}
						
						// Invio al backend Netlify
						function inviaPrenotazione(payload) {
						  fetch("/.netlify/functions/create-checkout-session", {
						    method: "POST",
						    headers: { "Content-Type": "application/json" },
						    body: JSON.stringify(payload)
						  })
						  .then(res => res.json())
						  .then(session => stripe.redirectToCheckout({ sessionId: session.id }))
						  .catch(err => alert("Errore nel pagamento: " + err.message));
						}
						
						// Caricamento tratte da Google Script
						fetch("https://script.google.com/macros/s/AKfycbyqKn1lcDJUPsRg_HtKOAlKJMlG4mfYtRPIITzqUdKh/dev")
						  .then(res => res.json())
						  .then(data => {
						    let html = `<table border="1"><tr>
						      <th>Partenza</th><th>Arrivo</th><th>Orario</th><th>Prezzo</th>
						      <th>Data</th><th>Posto</th><th>Email</th><th>Prenota</th></tr>`;
						
						    data.forEach(treno => {
						      const id = treno.codice;
						      html += `<tr>
						        <td>${treno.partenza}</td>
						        <td>${treno.arrivo}</td>
						        <td>${treno.orario}</td>
						        <td>${treno.prezzo}</td>
						        <td><input type="date" id="data-${id}"></td>
						        <td>
						          <select id="posto-${id}">
						            <option>1A</option><option>2B</option><option>3C</option>
						          </select>
						        </td>
						        <td><input type="email" id="email-${id}" placeholder="cliente@email.it"></td>
						        <td><button id="btn-${id}">Prenota</button></td>
						      </tr>`;
						    });
						
						    html += "</table>";
						    document.getElementById("italotreni").innerHTML = html;
						
						    // Attiva i pulsanti
						    data.forEach(treno => {
						      document.getElementById("btn-" + treno.codice).addEventListener("click", () => acquista(treno));
						    });
						  })
						  .catch(err => {
						    document.getElementById("italotreni").innerHTML = "<p>❌ Errore nel caricamento tratte.</p>";
						  });
						</script>

		<script>
		
		const stripe = Stripe('pk_live_51RcZZKFt7EaY9OTPn4hu3z4ZYfvJLZ1JsqNJhsyKj7T5BBSQCDOGVMDq5YUCkYL5HqsqoE9et25CbUjGZkAdpblO00lNy34est'); // Inserisci la tua chiave pubblica Stripe
		
		
		
		document.addEventListener('DOMContentLoaded', () => {
		
		  const form = document.getElementById('train-search-form');
		
		  const results = document.getElementById('search-results');
		
		
		
		  form.addEventListener('submit', async (e) => {
		
		    e.preventDefault();
		
		    const query = new URLSearchParams(new FormData(form)).toString();
		
		    results.innerHTML = '🔎 Ricerca in corso...';
		
		
		
		    try {
		
		      const res = await fetch('/.netlify/functions/searchTrains?' + query);
		
		      const trains = await res.json();
		
		      results.innerHTML = trains.length ? trains.map(t => `
		
		        <div class="train-result">
		
		          <p><strong>${t.TrainNumber}</strong><br>${t.DepartureTime} → ${t.ArrivalTime}<br>Prezzo: €${t.Price}</p>
		
		          <button onclick="bookTrain('${t.TrainNumber}', ${parseFloat(t.Price) * 100})">Prenota</button>
		
		        </div>
		
		      `).join('') : '<p>❌ Nessun treno trovato.</p>';
		
		    } catch {
		
		      results.innerHTML = '<p>⚠️ Errore nella ricerca.</p>';
		
		    }
		
		  });
		
		});
		
		
		
		async function bookTrain(trainNumber, amount) {
		
		  try {
		
		    const res = await fetch('/.netlify/functions/create-checkout-session', {
		
		      method: 'POST',
		
		      headers: { 'Content-Type': 'application/json' },
		
		      body: JSON.stringify({ trainNumber, amount })
		
		    });
		
		    const data = await res.json();
		
		    if (data.url) {
		
		      window.location.href = data.url;
		
		    } else {
		
		      alert("❌ Pagamento non avviato.");
		
		    }
		
		  } catch {
		
		    alert('⚠️ Errore durante il pagamento.');
		
		  }
		
		}
		
		</script>
