						<body>
						
						  <div class="header">italotreno.it</div>
						
						  <div class="form-box">
						    <form id="italotreni-form">
						      <div class="form-group">
						        <input type="text" id="from" placeholder="Da: Scrivi la città" list="stazioni" required />
						      </div>
						
						      <div class="form-group">
						        <input type="text" id="to" placeholder="A: Scrivi la città" list="stazioni" required />
						      </div>
						
						      <datalist id="stazioni">
						        <option value="Milano">
						        <option value="Roma">
						        <option value="Napoli">
						        <option value="Torino">
						        <option value="Firenze">
						        <option value="Bologna">
						      </datalist>
						
						      <div class="form-group">
						        <input type="date" id="date-andata" required />
						      </div>
						
						      <div class="form-group">
						        <input type="date" id="date-ritorno" />
						      </div>
						
						      <div class="form-group">
						        <input type="number" id="passengers" min="1" max="9" value="1" required placeholder="Numero passeggeri" />
						      </div>
						
						      <div class="form-group">
						        <select id="ambiente" required>
						          <option value="">Ambiente</option>
						          <option value="Smart">Smart</option>
						          <option value="Club">Club</option>
						          <option value="Prima">Prima</option>
						        </select>
						      </div>
						
						      <button type="submit" class="search-btn">Cerca Treni</button>
						    </form>
						
						    <div id="risultati"></div>
						  </div>
						
						  <script src="https://js.stripe.com/v3/"></script>
						
						  <script>
						    document.getElementById("italotreni-form").addEventListener("submit", function(e) {
						      e.preventDefault();
						
						      const dati = {
						        from: document.getElementById("from").value,
						        to: document.getElementById("to").value,
						        data: document.getElementById("date-andata").value,
						        ritorno: document.getElementById("date-ritorno").value,
						        passeggeri: document.getElementById("passengers").value,
						        ambiente: document.getElementById("ambiente").value
						      };
						
						      fetch("https://script.google.com/macros/s/AKfycbyXaSq3zvubSmNLLhCGY-hDvCmJBZ0GxGmJjx_UB7M_7a68_WKcKYjfweQDueuZi7bIVw/exec", {
						        method: "POST",
						        headers: { "Content-Type": "application/json" },
						        body: JSON.stringify(dati)
						      })
						      .then(res => res.text())
						      .then(data => {
						        document.getElementById("risultati").innerHTML = `
						          <p><strong>Treni disponibili:</strong><br>${data}</p>
						          <button class="pay-btn" onclick="pagaTreno({
						            from: dati.from,
						            to: dati.to,
						            data: dati.data,
						            orario: '08:40',
						            prezzo: 3990,
						            passeggeri: dati.passeggeri
						          })">Prenota e paga con Stripe</button>
						        `;
						      });
						    });
						
						    function pagaTreno(treno) {
						      fetch('http://localhost:4242/crea-sessione', {
						        method: 'POST',
						        headers: { 'Content-Type': 'application/json' },
						        body: JSON.stringify(treno)
						      })
						      .then(res => res.json())
						      .then(data => {
						        const stripe = Stripe('pk_test_TUA_CHIAVE_PUBBLICA'); // 🔐 Inserisci la tua chiave pubblica Stripe
						        stripe.redirectToCheckout({ sessionId: data.id });
						      });
						    }
						  </script>

		<script>
		
		const stripe = Stripe('pk_live_51RcZZKFt7EaY9OTPn4hu3z4ZYfvJLZ1JsqNJhsyKj7T5BBSQCDOGVMDq5YUCkYL5HqsqoE9et25CbUjGZkAdpblO00lNy34est'); // Inserisci la tua chiave pubblica Stripe
		
		
		
		document.addEventListener('DOMContentLoaded', () => {
		
		  const form = document.getElementById('train-search-form');
		
		  const results = document.getElementById('search-results');
		
		
		
		  form.addEventListener('submit', async (e) => {
		
		    e.preventDefault();
		
		    const query = new URLSearchParams(new FormData(form)).toString();
		
		    results.innerHTML = '🔎 Ricerca in corso...';
		
		
		
		    try {
		
		      const res = await fetch('/.netlify/functions/searchTrains?' + query);
		
		      const trains = await res.json();
		
		      results.innerHTML = trains.length ? trains.map(t => `
		
		        <div class="train-result">
		
		          <p><strong>${t.TrainNumber}</strong><br>${t.DepartureTime} → ${t.ArrivalTime}<br>Prezzo: €${t.Price}</p>
		
		          <button onclick="bookTrain('${t.TrainNumber}', ${parseFloat(t.Price) * 100})">Prenota</button>
		
		        </div>
		
		      `).join('') : '<p>❌ Nessun treno trovato.</p>';
		
		    } catch {
		
		      results.innerHTML = '<p>⚠️ Errore nella ricerca.</p>';
		
		    }
		
		  });
		
		});
		
		
		
		async function bookTrain(trainNumber, amount) {
		
		  try {
		
		    const res = await fetch('/.netlify/functions/create-checkout-session', {
		
		      method: 'POST',
		
		      headers: { 'Content-Type': 'application/json' },
		
		      body: JSON.stringify({ trainNumber, amount })
		
		    });
		
		    const data = await res.json();
		
		    if (data.url) {
		
		      window.location.href = data.url;
		
		    } else {
		
		      alert("❌ Pagamento non avviato.");
		
		    }
		
		  } catch {
		
		    alert('⚠️ Errore durante il pagamento.');
		
		  }
		
		}
		
		</script>
