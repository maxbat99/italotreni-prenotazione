<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Italotreni - Prenota</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      font-size: 16px;
    }
    .header {
      background-color: #b2002e;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    .form-box {
      padding: 20px;
      background-color: #fff;
      max-width: 600px;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .form-group {
      margin-bottom: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input[type="date"] {
      appearance: none;
      background-color: #fff;
      background-image: url('https://cdn-icons-png.flaticon.com/512/747/747310.png');
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 20px 20px;
      padding-right: 36px;
    }
    input[type="number"]::-webkit-inner-spin-button {
      opacity: 1;
    }
    input[type="number"] {
      appearance: none;
      background-color: #fff;
      background-image: url('https://cdn-icons-png.flaticon.com/512/149/149071.png');
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 18px 18px;
      padding-right: 36px;
    }
    .search-btn {
      margin-top: 16px;
      width: 100%;
      background-color: #b2002e;
      color: white;
      font-size: 16px;
      padding: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .pay-btn {
      margin-top: 10px;
      background-color: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    #risultati {
      margin-top: 20px;
      font-size: 16px;
      text-align: center;
    }

    /* 🔹 Responsive per smartphone */
    @media screen and (max-width: 480px) {
      body {
        font-size: 15px;
      }
      .header {
        font-size: 16px;
        padding: 12px;
      }
      input, select {
        font-size: 14px;
        padding: 10px;
      }
      .search-btn, .pay-btn {
        font-size: 14px;
        padding: 12px;
      }
    }

    /* 🔹 Responsive per tablet */
    @media screen and (max-width: 820px) {
      .form-box {
        padding: 10px;
      }
      #risultati {
        font-size: 15px;
      }
    }

    /* 🔹 Layout per desktop */
    @media screen and (min-width: 1024px) {
      .form-box {
        padding: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="header">italotreno.it</div>

  <div class="form-box">
    <form id="italotreni-form">
      <div class="form-group">
        <input type="text" id="from" placeholder="Da: Scrivi la città" list="stazioni" required />
      </div>
      <div class="form-group">
        <input type="text" id="to" placeholder="A: Scrivi la città" list="stazioni" required />
      </div>
      <datalist id="stazioni">
        <option value="Milano">
        <option value="Roma">
        <option value="Napoli">
        <option value="Torino">
        <option value="Firenze">
        <option value="Bologna">
      </datalist>
      <div class="form-group">
        <input type="date" id="date-andata" required />
      </div>
      <div class="form-group">
        <input type="date" id="date-ritorno" />
      </div>
      <div class="form-group">
        <input type="number" id="passengers" min="1" max="9" value="1" required placeholder="Numero passeggeri" />
      </div>
      <div class="form-group">
        <select id="ambiente" required>
          <option value="">Ambiente</option>
          <option value="Smart">Smart</option>
          <option value="Club">Club</option>
          <option value="Prima">Prima</option>
        </select>
      </div>
      <div class="form-group">
        <input type="email" id="email" required placeholder="Email passeggero" />
      </div>

      <button type="submit" class="search-btn">Prenota e paga</button>
    </form>

    <div id="risultati"></div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const stripe = Stripe("pk_test_TUA_CHIAVE_PUBBLICA");

    document.getElementById("italotreni-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const dati = {
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        data: document.getElementById("date-andata").value,
        ritorno: document.getElementById("date-ritorno").value,
        passeggeri: document.getElementById("passengers").value,
        ambiente: document.getElementById("ambiente").value,
        email: document.getElementById("email").value,
        orario: "08:40",
        prezzo: 3990
      };

      const response = await fetch("/.netlify/functions/crea-sessione", { // ✅ aggiornato qui
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dati)
      });

      const result = await response.json();
      if (result.id) {
        stripe.redirectToCheckout({ sessionId: result.id });
      } else {
        document.getElementById("risultati").innerText = "Errore: " + result.error;
      }
    });
  </script>

</body>
</html>
