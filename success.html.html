<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>🎉 Prenotazione completata</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f1f1;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }
    .check {
      font-size: 80px;
      color: #4BB543;
      animation: bounce 0.6s ease;
    }
    h2 {
      color: #4BB543;
      margin-bottom: 10px;
    }
    .message {
      max-width: 500px;
      text-align: center;
      font-size: 18px;
    }
    .btn {
      margin-top: 25px;
      padding: 12px 24px;
      background-color: #B2002E;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    @keyframes bounce {
      0% { transform: scale(0.6); opacity: 0.5; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="check">✅</div>
  <h2>Prenotazione completata!</h2>
  <p class="message">Grazie per aver prenotato con <strong>Italo Bob</strong>.<br>
    Riceverai presto una email con il tuo biglietto digitale e il QR code da mostrare all’imbarco.
  </p>
  <button class="btn" onclick="window.location.href='index.html'">🏠 Torna alla home</button>
</body>
</html>
